<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>サムネパズルチャレンジ</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: white;
}

/* 全体 */
.container {
  display: flex;
  gap: 20px;
  padding: 20px;
}

/* 左側 */
.left {
  flex: 1;
}

.title {
  font-size: 24px;
  font-weight: bold;
  margin-bottom: 10px;
}

.info-boxes {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}

.box {
  flex: 1;
  padding: 15px;
  border-radius: 10px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  text-align: center;
}

.box.blue { border-color: #00d4ff; }
.box.pink { border-color: #ff3ec9; }

.value {
  font-size: 24px;
  font-weight: bold;
}

/* パズル */
#game {
  width: 300px;
  height: 300px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin: 20px auto;
  border-radius: 10px;
  overflow: hidden;
}

.tile {
  width: 100px;
  height: 100px;
  background-size: 300px 300px;
  cursor: pointer;
}

.empty {
  background: #000;
}

/* ボタン */
.buttons {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.pause {
  background: #0ea5e9;
}

.retry {
  background: #ec4899;
}

/* 右側 */
.right {
  flex: 1;
}

.result-box {
  background: rgba(255,255,255,0.05);
  border-radius: 10px;
  padding: 15px;
  margin-bottom: 15px;
}

.result-title {
  font-size: 20px;
  margin-bottom: 10px;
}

.result-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.result-grid img {
  width: 100%;
  border-radius: 8px;
  cursor: pointer;
}

/* ネオン風 */
.neon {
  text-align: center;
  font-size: 28px;
  color: #fff;
  text-shadow: 0 0 10px #00d4ff, 0 0 20px #ff3ec9;
  margin-bottom: 15px;
}
</style>
</head>

<body>

<div class="container">

  <!-- 左 -->
  <div class="left">

    <div class="title">サムネパズルチャレンジ</div>

    <div class="info-boxes">
      <div class="box">
        <div>残り時間</div>
        <div class="value" id="time">180</div>
      </div>
      <div class="box blue">
        <div>+10秒</div>
      </div>
      <div class="box pink">
        <div>クリア数</div>
        <div class="value" id="score">0</div>
      </div>
    </div>

    <div id="game"></div>

    <div class="buttons">
      <button class="pause">一時停止</button>
      <button class="retry" onclick="location.reload()">リトライ</button>
    </div>

  </div>

  <!-- 右 -->
  <div class="right">

    <div class="neon">タイムアップ！</div>

    <div class="result-box">
      <div class="result-title">今回クリアしたサムネ</div>
      <div class="result-grid" id="result"></div>
    </div>

  </div>

</div>

<script>

// ▼ 仮データ
const videoList = [
  "dQw4w9WgXcQ",
  "3JZ_D3ELwOQ",
  "kXYiU_JCYtU"
];

let board = [];
let emptyIndex = 8;
let currentVideo = "";
let time = 180;
let score = 0;
let clearedList = [];

// 初期
startNewPuzzle();

// ▼ 簡単パズル生成
function startNewPuzzle() {
  currentVideo = videoList[Math.floor(Math.random() * videoList.length)];

  // 完成状態からスタート
  board = [...Array(9).keys()];
  emptyIndex = 8;

  // ★ここが神ポイント（1〜3手だけ崩す）
  let moves = Math.floor(Math.random() * 3) + 1;
  for (let i = 0; i < moves; i++) {
    randomMove();
  }

  drawBoard();
}

// ▼ ランダム1手だけ動かす
function randomMove() {
  const possible = getMovableIndexes(emptyIndex);
  const rand = possible[Math.floor(Math.random() * possible.length)];

  [board[rand], board[emptyIndex]] = [board[emptyIndex], board[rand]];
  emptyIndex = rand;
}

// ▼ 動ける場所取得
function getMovableIndexes(index) {
  const moves = [];

  if (index % 3 !== 0) moves.push(index - 1);
  if (index % 3 !== 2) moves.push(index + 1);
  if (index - 3 >= 0) moves.push(index - 3);
  if (index + 3 < 9) moves.push(index + 3);

  return moves;
}

// ▼ 描画
function drawBoard() {
  const game = document.getElementById("game");
  game.innerHTML = "";

  board.forEach((num, i) => {
    const tile = document.createElement("div");

    if (num === 8) {
      tile.className = "tile empty";
    } else {
      tile.className = "tile";
      tile.style.backgroundImage = `url(https://img.youtube.com/vi/${currentVideo}/hqdefault.jpg)`;

      const x = (num % 3) * 100;
      const y = Math.floor(num / 3) * 100;

      // 下カット
      tile.style.backgroundPosition = `-${x}px -${y + 30}px`;
    }

    tile.onclick = () => move(i);
    game.appendChild(tile);
  });
}

// ▼ 移動
function move(index) {
  const valid = getMovableIndexes(emptyIndex);

  if (valid.includes(index)) {
    [board[index], board[emptyIndex]] = [board[emptyIndex], board[index]];
    emptyIndex = index;

    drawBoard();
    checkClear();
  }
}

// ▼ クリア判定
function checkClear() {
  if (board.every((v,i)=>v===i)) {
    score++;
    time += 10;
    document.getElementById("score").innerText = score;

    addClear(currentVideo);
    startNewPuzzle();
  }
}

// ▼ 履歴
function addClear(id) {
  clearedList.push(id);
  if (clearedList.length > 10) clearedList.shift();
  showResult();
}

// ▼ リザルト表示
function showResult() {
  const el = document.getElementById("result");
  el.innerHTML = "";

  clearedList.slice().reverse().forEach(id => {
    const img = document.createElement("img");
    img.src = `https://img.youtube.com/vi/${id}/hqdefault.jpg`;
    img.onclick = () => window.open(`https://youtube.com/watch?v=${id}`);
    el.appendChild(img);
  });
}

// ▼ タイマー
setInterval(()=>{
  time--;
  document.getElementById("time").innerText = time;

  if(time<=0){
    alert("終了！クリア数："+score);
    location.reload();
  }
},1000);

</script>
  
</body>
</html>
